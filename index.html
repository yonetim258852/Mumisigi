<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mum Işığı Atölyesi — El yapımı, küçük üretim mum atölyesi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #faf6ee;
    --cream-deep: #ede5d4;
    --gold: #b8945a;
    --gold-bright: #c8a866;
    --gold-glow: #e8a447;
    --sage: #9eab8a;
    --dark: #3d2f22;
    --mid: #6b5847;
    --soft: #8a7a68;
  }

  body {
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--dark);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ============ SPLASH INTRO SCREEN ============ */
  body.splash-active { overflow: hidden; }
  body.splash-active .hero { opacity: 0; }

  .splash {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    transition: opacity 1.2s ease, visibility 1.2s ease;
  }
  .splash.fade-out {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  /* Subtle background spark */
  .splash::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 300px; height: 300px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(232, 164, 71, 0.15) 0%, transparent 60%);
    animation: splashGlow 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes splashGlow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  }

  /* ========== AŞAMA 2: Logo + içerik (video bittikten sonra) ========== */
  .splash-content {
    position: relative;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1.2s ease, visibility 1.2s ease;
    width: 100%;
  }
  .splash-content.show {
    opacity: 1;
    visibility: visible;
  }
  /* Stage 2 alt elementleri: ancak .show class'ı geldiğinde animate olsun */
  .splash-content .splash-logo,
  .splash-content .splash-title,
  .splash-content .splash-credit,
  .splash-content .splash-quote,
  .splash-content .splash-buttons {
    animation: none !important;
    opacity: 0;
  }
  .splash-content.show .splash-logo {
    animation: splashLogoIn 2s ease 0.3s forwards !important;
  }
  .splash-content.show .splash-title {
    animation: splashTitleIn 1.5s ease 0.8s forwards !important;
  }
  .splash-content.show .splash-credit {
    animation: splashCreditIn 1.5s ease 1.5s forwards !important;
  }
  .splash-content.show .splash-quote {
    animation: splashQuoteIn 1.5s ease 2.2s forwards !important;
  }
  .splash-content.show .splash-buttons {
    animation: splashButtonsIn 1.2s ease 3s forwards !important;
  }

  /* Logo as centerpiece */
  .splash-logo {
    width: 320px;
    height: 320px;
    margin-bottom: 20px;
    opacity: 0;
    animation: splashLogoIn 2s ease 0.3s forwards;
    filter: drop-shadow(0 0 40px rgba(232, 164, 71, 0.3));
    position: relative;
    z-index: 2;
    user-select: none;
    -webkit-user-drag: none;
  }
  @keyframes splashLogoIn {
    0% { opacity: 0; transform: scale(0.92); filter: drop-shadow(0 0 0 rgba(232, 164, 71, 0)); }
    60% { opacity: 1; transform: scale(1.02); filter: drop-shadow(0 0 60px rgba(232, 164, 71, 0.5)); }
    100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 40px rgba(232, 164, 71, 0.3)); }
  }
  @keyframes splashLogoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .splash-logo.entered {
    animation: splashLogoFloat 4s ease-in-out infinite;
  }
  @keyframes splashFlicker {
    0%, 100% { transform: scale(1) rotate(0); }
    25% { transform: scale(1.05, 0.95) rotate(-1deg); }
    50% { transform: scale(0.97, 1.05) rotate(1deg); }
    75% { transform: scale(1.03, 0.98) rotate(-0.5deg); }
  }

  /* "by Merve Aslan" */
  .splash-credit {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: rgba(250, 246, 238, 0.55);
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 0;
    margin-bottom: 30px;
    opacity: 0;
    animation: splashCreditIn 1.5s ease 2.2s forwards;
    position: relative;
    z-index: 2;
  }
  .splash-credit em {
    color: rgba(232, 164, 71, 0.85);
    font-style: italic;
    font-weight: 400;
  }
  @keyframes splashCreditIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* "Bir mum hikayesi..." */
  .splash-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: #e8a447;
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 30px;
    opacity: 0;
    animation: splashTitleIn 1.5s ease 1.5s forwards;
    position: relative;
    z-index: 2;
    text-transform: lowercase;
  }
  @keyframes splashTitleIn {
    from { opacity: 0; transform: translateY(15px); letter-spacing: 8px; }
    to { opacity: 1; transform: translateY(0); letter-spacing: 4px; }
  }

  /* Söz */
  .splash-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: #faf6ee;
    font-size: 42px;
    line-height: 1.3;
    max-width: 800px;
    margin-bottom: 80px;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: splashQuoteIn 1.5s ease 3s forwards;
  }
  .splash-quote em {
    color: #e8a447;
    font-style: italic;
  }
  @keyframes splashQuoteIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Butonlar */
  .splash-buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: splashButtonsIn 1.2s ease 4.5s forwards;
    position: relative;
    z-index: 2;
  }
  @keyframes splashButtonsIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .splash-btn {
    padding: 16px 32px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid;
  }
  .splash-btn-primary {
    background: transparent;
    color: #faf6ee;
    border-color: rgba(250, 246, 238, 0.4);
  }
  .splash-btn-primary:hover {
    border-color: #e8a447;
    color: #e8a447;
    transform: translateY(-2px);
  }
  .splash-btn-secondary {
    background: #faf6ee;
    color: #000;
    border-color: #faf6ee;
  }
  .splash-btn-secondary:hover {
    background: #e8a447;
    border-color: #e8a447;
    color: #000;
    transform: translateY(-2px);
  }

  /* Skip note */
  .splash-skip {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(250, 246, 238, 0.3);
    opacity: 0;
    animation: splashSkipIn 1s ease 5.5s forwards;
    z-index: 2;
  }
  @keyframes splashSkipIn { to { opacity: 1; } }

  /* Video modal */
  .video-modal {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .video-modal.show {
    display: flex;
    opacity: 1;
  }
  .video-modal.fading-out {
    opacity: 0;
  }
  .video-modal-box {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .video-modal-inner {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-modal video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }
  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #faf6ee;
    text-align: center;
    padding: 40px;
    background: radial-gradient(circle at center, #2a1f17 0%, #000 70%);
  }
  .video-placeholder-flame {
    width: 60px; height: 90px;
    margin-bottom: 24px;
    animation: splashFlicker 2.5s ease-in-out infinite;
  }
  .video-placeholder-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 28px;
    color: #faf6ee;
    margin-bottom: 12px;
    max-width: 480px;
    line-height: 1.3;
  }
  .video-placeholder-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #e8a447;
  }
  .video-close {
    position: absolute;
    top: 24px; right: 24px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(250, 246, 238, 0.3);
    color: #faf6ee;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.3s;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .video-close:hover {
    border-color: #e8a447;
    color: #e8a447;
    background: rgba(0, 0, 0, 0.7);
  }

  /* Mobile */
  @media (max-width: 768px) {
    .splash-logo { width: 220px; height: 220px; margin-bottom: 20px; }
    .splash-credit { font-size: 12px; margin-bottom: 18px; }
    .splash-title { font-size: 16px; letter-spacing: 3px; margin-bottom: 30px; }
    .splash-quote { font-size: 28px; margin-bottom: 60px; }
    .splash-buttons { flex-direction: row; flex-wrap: nowrap; gap: 10px; width: 100%; max-width: 380px; }
    .splash-btn { padding: 14px 18px; font-size: 9px; letter-spacing: 2px; flex: 1; justify-content: center; white-space: nowrap; }
    .video-modal { padding: 16px; }
    .video-modal-box { max-width: 100%; }
    .video-modal-inner { border-radius: 8px; }
    .video-close { top: 16px; right: 16px; width: 38px; height: 38px; font-size: 16px; }
  }

  /* ============ CINEMATIC TRANSITION ============
     Video bitti, son karesi LOGOMUZ. Bridge başlar ve logo
     videodan splash'e KESINTISIZ devam eder. */
  .cinematic-bridge {
    position: fixed;
    inset: 0;
    z-index: 10001;
    display: none;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }
  .cinematic-bridge.active {
    display: flex;
  }

  /* Phase 1: Soft golden glow blooms (video logosu zaten görünüyor) */
  .cb-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(232, 164, 71, 0.4) 0%, rgba(232, 164, 71, 0.1) 30%, transparent 60%);
    opacity: 0;
    pointer-events: none;
  }
  .cinematic-bridge.active .cb-flash {
    animation: cbFlash 2s ease-out forwards;
  }
  @keyframes cbFlash {
    0% { opacity: 0; transform: scale(0.6); }
    40% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0; transform: scale(1.5); }
  }

  /* Phase 2: Subtle vertical light beam from behind logo */
  .cb-beam {
    position: absolute;
    top: 50%; left: 50%;
    width: 200px;
    height: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(232, 164, 71, 0.3) 30%, rgba(253, 232, 179, 0.4) 50%, rgba(232, 164, 71, 0.3) 70%, transparent 100%);
    transform: translate(-50%, -50%);
    opacity: 0;
    filter: blur(20px);
  }
  .cinematic-bridge.active .cb-beam {
    animation: cbBeam 2.5s ease-out forwards;
  }
  @keyframes cbBeam {
    0% { opacity: 0; height: 0; }
    30% { opacity: 0.6; height: 100vh; }
    100% { opacity: 0; height: 100vh; }
  }

  /* Phase 3: Golden particles rising softly */
  .cb-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .cb-particle {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 4px; height: 4px;
    background: #e8a447;
    border-radius: 50%;
    box-shadow: 0 0 12px #e8a447;
    opacity: 0;
  }
  .cinematic-bridge.active .cb-particle {
    animation: cbParticleRise 3s ease-out forwards;
  }
  @keyframes cbParticleRise {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    30% { opacity: 0.9; }
    100% { opacity: 0; transform: translate(calc(-50% + var(--drift, 0px)), -90vh) scale(1.2); }
  }

  /* Phase 4: Logo APPEARS FROM VIDEO'S LAST FRAME — smooth handoff */
  .cb-logo {
    width: 380px;
    height: 380px;
    opacity: 1; /* Hemen görünür - video sonundaki logoyla aynı görüntü */
    transform: scale(1);
    z-index: 10;
    filter: drop-shadow(0 0 60px rgba(232, 164, 71, 0.6));
    animation: cbLogoPulse 4s ease-in-out infinite;
  }
  @keyframes cbLogoPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 50px rgba(232, 164, 71, 0.5)); }
    50% { transform: scale(1.03); filter: drop-shadow(0 0 80px rgba(232, 164, 71, 0.8)); }
  }

  /* Phase 5: Tagline appears below */
  .cb-tagline {
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #e8a447;
    font-size: 16px;
    letter-spacing: 6px;
    text-transform: lowercase;
    opacity: 0;
    text-align: center;
    white-space: nowrap;
  }
  .cinematic-bridge.active .cb-tagline {
    animation: cbTagline 1.5s ease 1.5s forwards;
  }
  @keyframes cbTagline {
    from { opacity: 0; letter-spacing: 12px; }
    to { opacity: 0.9; letter-spacing: 6px; }
  }

  /* Phase 6: Continue button */
  .cb-continue {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 32px;
    background: rgba(250, 246, 238, 0.1);
    border: 1px solid rgba(232, 164, 71, 0.4);
    color: #faf6ee;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: all 0.3s;
  }
  .cinematic-bridge.active .cb-continue {
    animation: cbTagline 1.5s ease 2.5s forwards;
  }
  .cb-continue:hover {
    border-color: #e8a447;
    background: rgba(232, 164, 71, 0.15);
    transform: translateX(-50%) translateY(-2px);
  }

  @media (max-width: 768px) {
    .cb-logo { width: 260px; height: 260px; }
    .cb-tagline { font-size: 13px; letter-spacing: 4px; }
  }

  /* Custom cursor */
  .cursor-flame {
    position: fixed;
    width: 20px; height: 20px;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease, opacity 0.3s ease;
    opacity: 0;
  }
  @media (hover: hover) {
    .cursor-flame { opacity: 1; }
    body { cursor: none; }
    a, button, .clickable { cursor: none; }
  }

  /* Floating ambient particles */
  .ambient {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
  }
  .ambient-dot {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--gold-glow);
    border-radius: 50%;
    opacity: 0;
    box-shadow: 0 0 6px var(--gold-glow);
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 100;
    background: rgba(250, 246, 238, 0);
    backdrop-filter: blur(0px);
    transition: background 0.4s ease, backdrop-filter 0.4s ease, padding 0.4s ease;
  }
  nav.scrolled {
    background: rgba(250, 246, 238, 0.9);
    backdrop-filter: blur(12px);
    padding: 14px 40px;
    border-bottom: 1px solid rgba(184, 148, 90, 0.15);
  }
  .nav-brand {
    font-family: 'Allura', cursive;
    font-size: 28px;
    color: var(--gold);
  }
  .nav-links {
    display: flex; gap: 32px;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--mid);
  }
  .nav-links a { text-decoration: none; color: inherit; }
  .nav-links span { transition: color 0.3s; }
  .nav-links a:hover span { color: var(--gold); }

  /* ============ HERO ============ */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px 40px 40px;
    position: relative;
    text-align: center;
  }

  /* Hero logo container - watercolor logo */
  .hero-logo {
    width: 320px; height: 320px;
    margin-bottom: 30px;
    position: relative;
    opacity: 0;
    transform: scale(0.92);
    filter: drop-shadow(0 0 0 rgba(232, 164, 71, 0));
    transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.34, 1.3, 0.64, 1), filter 1.5s ease;
  }
  .hero-logo-img {
    width: 100%; height: 100%;
    user-select: none;
    -webkit-user-drag: none;
    object-fit: contain;
  }
  .animate-in .hero-logo {
    opacity: 1;
    transform: scale(1);
    filter: drop-shadow(0 0 30px rgba(232, 164, 71, 0.25));
    animation: heroLogoFloat 5s ease-in-out 2s infinite;
  }
  @keyframes heroLogoFloat {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1) translateY(-8px); }
  }

  /* OLD SVG logo styles kept for backward compatibility (boş - artık SVG yok) */
    0%, 100% { transform: scale(1) rotate(0); }
    25% { transform: scale(1.05, 0.95) rotate(-1deg); }
    50% { transform: scale(0.97, 1.05) rotate(1deg); }
    75% { transform: scale(1.03, 0.98) rotate(-0.5deg); }
  }
  @keyframes bloomLeft {
    from { opacity: 0; transform: scale(0) rotate(-20deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes bloomRight {
    from { opacity: 0; transform: scale(0) rotate(20deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes bloom {
    from { opacity: 0; transform: scale(0); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes writeText {
    from { opacity: 1; clip-path: inset(0 100% 0 0); }
    to { opacity: 1; clip-path: inset(0 0 0 0); }
  }

  .hero-eyebrow {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.8s forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    line-height: 1.05;
    color: var(--dark);
    font-weight: 300;
    margin-bottom: 24px;
    letter-spacing: -1px;
    max-width: 800px;
  }
  .hero-title em {
    font-style: italic;
    color: var(--gold);
  }
  .hero-title .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
  }
  .animate-in .hero-title .word {
    animation: fadeUp 0.6s ease forwards;
  }
  .animate-in .hero-title .word:nth-child(1) { animation-delay: 2s; }
  .animate-in .hero-title .word:nth-child(2) { animation-delay: 2.15s; }
  .animate-in .hero-title .word:nth-child(3) { animation-delay: 2.3s; }
  .animate-in .hero-title .word:nth-child(4) { animation-delay: 2.45s; }
  .animate-in .hero-title .word:nth-child(5) { animation-delay: 2.6s; }

  .hero-sub {
    font-size: 15px;
    color: var(--soft);
    line-height: 1.9;
    max-width: 440px;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.9s forwards;
  }

  .hero-cta {
    display: inline-block;
    background: var(--dark);
    color: var(--cream);
    padding: 16px 36px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeUp 0.8s ease 3.2s forwards;
    position: relative;
    overflow: hidden;
  }
  .hero-cta:hover { background: var(--gold); transform: translateY(-2px); }
  .hero-cta::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
    transition: left 0.6s ease;
  }
  .hero-cta:hover::after { left: 100%; }

  .scroll-hint {
    position: absolute;
    bottom: 40px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease 5.2s forwards, scrollBounce 2s ease-in-out 6s infinite;
  }
  @keyframes scrollBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* ============ ATMOSPHERIC HERO IMAGE ============ */
  .atmospheric {
    position: relative;
    width: 100%;
    min-height: 80vh;
    overflow: hidden;
    margin: 0;
    background: #1a1410;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }
  .atmospheric-img {
    max-width: 100%;
    max-height: 80vh;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    border-radius: 2px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }
  .atmospheric-overlay {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 24px 40px;
    background: rgba(20, 14, 10, 0.75);
    backdrop-filter: blur(10px);
    border-radius: 4px;
    max-width: 700px;
    width: calc(100% - 80px);
  }
  .atmospheric-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    line-height: 1.4;
    color: #faf6ee;
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    letter-spacing: -0.3px;
    margin: 0;
  }
  .atmospheric-quote em {
    font-style: italic;
    font-weight: 300;
    color: #e8a447;
  }
  @media (max-width: 768px) {
    .atmospheric { min-height: 60vh; padding: 40px 16px; }
    .atmospheric-img { max-height: 60vh; }
    .atmospheric-overlay { padding: 16px 24px; bottom: 24px; width: calc(100% - 32px); }
    .atmospheric-quote { font-size: 16px; }
  }

  /* ============ EDITORIAL BANNER ============ */
  .banner {
    padding: 140px 40px;
    text-align: center;
    border-top: 1px solid rgba(184, 148, 90, 0.15);
    border-bottom: 1px solid rgba(184, 148, 90, 0.15);
  }
  .banner-eyebrow {
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .banner-h {
    font-family: 'Cormorant Garamond', serif;
    font-size: 120px;
    line-height: 0.95;
    color: var(--dark);
    font-weight: 300;
    letter-spacing: -3px;
  }
  .banner-h em {
    color: var(--gold);
    font-style: italic;
    display: block;
  }

  /* ============ COLLECTION ============ */
  .collection {
    padding: 120px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .col-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 60px;
  }
  .col-eyebrow {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .col-link {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dark);
    border-bottom: 1px solid var(--gold);
    padding-bottom: 4px;
    text-decoration: none;
    transition: all 0.3s;
  }
  .col-link:hover { color: var(--gold); padding-bottom: 8px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  /* CARD with hover-to-light effect */
  .card {
    cursor: pointer;
    text-align: left;
    position: relative;
  }
  .card-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .card-img {
    aspect-ratio: 3/4;
    border-radius: 4px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: all 0.6s ease;
    background-color: #ede5d4;
  }
  .card-img-1 { background: linear-gradient(135deg, #ede5d4, #d8c9af); }
  .card-img-2 { background: linear-gradient(135deg, #d8c9af, #c4b08a); }
  .card-img-3 { background: linear-gradient(135deg, #c4b08a, #a8946d); }

  /* Mini candle inside card */
  .mini-candle {
    position: absolute;
    bottom: 15%; left: 50%;
    transform: translateX(-50%);
    width: 35%;
  }
  .mini-flame {
    transform-origin: center bottom;
    transform: scale(0);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  }
  .mini-glow {
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .card:hover .mini-flame {
    transform: scale(1);
    opacity: 1;
    animation: flicker 2s ease-in-out 0.4s infinite;
  }
  .card:hover .mini-glow {
    opacity: 0.6;
  }
  .card:hover .card-img {
    filter: brightness(1.05);
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 24px;
    color: var(--dark);
    margin-bottom: 8px;
    font-weight: 400;
    transition: color 0.3s;
  }
  .card:hover .card-name { color: var(--gold); }
  .card-scent {
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--mid);
  }
  .card-hover-hint {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,0,0,0.5);
    color: var(--cream);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(4px);
  }
  .card:hover .card-hover-hint { opacity: 1; }

  /* ============ STORY PREVIEW ============ */
  .story {
    padding: 140px 40px;
    background: var(--cream-deep);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
  }
  .story-img {
    aspect-ratio: 4/5;
    background: linear-gradient(135deg, #c4b08a, #8a6f4f);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  /* Candle silhouette inside story image */
  .story-candle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 30%;
  }
  .story-eyebrow {
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .story-h {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 56px;
    color: var(--dark);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 28px;
    letter-spacing: -0.5px;
  }
  .story-h em { color: var(--gold); }
  .story-p {
    font-size: 15px;
    color: var(--mid);
    line-height: 1.95;
    margin-bottom: 36px;
  }
  .story-link {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dark);
    border-bottom: 1px solid var(--gold);
    padding-bottom: 4px;
    text-decoration: none;
    transition: all 0.3s;
  }
  .story-link:hover { color: var(--gold); padding-bottom: 8px; }

  /* ============ VALUES ============ */
  .values {
    padding: 120px 40px;
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
  }
  .values-eyebrow {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .values-h {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 44px;
    color: var(--dark);
    font-weight: 300;
    margin-bottom: 60px;
    letter-spacing: -0.5px;
  }
  .values-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
  }
  .value-card {
    text-align: center;
    padding: 32px 20px;
    transition: transform 0.5s ease;
  }
  .value-card:hover { transform: translateY(-6px); }
  .value-icon {
    width: 56px; height: 56px;
    margin: 0 auto 24px;
    color: var(--gold);
    transition: transform 0.5s ease;
  }
  .value-card:hover .value-icon { transform: scale(1.1); }
  .value-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--dark);
    margin-bottom: 14px;
    font-weight: 400;
  }
  .value-desc {
    font-size: 14px;
    color: var(--soft);
    line-height: 1.8;
  }

  /* ============ COMPARISON ============ */
  .compare {
    padding: 120px 40px;
    background: var(--cream-deep);
  }
  .compare-inner {
    max-width: 1000px; margin: 0 auto;
  }
  .compare-eyebrow {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
  }
  .compare-h {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 44px;
    color: var(--dark);
    font-weight: 300;
    text-align: center;
    margin-bottom: 50px;
    letter-spacing: -0.5px;
  }
  .compare-table {
    background: var(--cream);
    border-radius: 6px;
    overflow: hidden;
  }
  .compare-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid rgba(184, 148, 90, 0.15);
    transition: background 0.3s;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-row:hover { background: rgba(184, 148, 90, 0.04); }
  .compare-cell {
    padding: 24px 28px;
    font-size: 14px;
    color: var(--mid);
  }
  .compare-row.header .compare-cell {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--gold);
    background: rgba(184, 148, 90, 0.06);
  }
  .compare-cell:first-child {
    font-family: 'Cormorant Garamond', serif;
    color: var(--dark);
    font-size: 15px;
  }
  .compare-cell:last-child {
    color: var(--dark);
    font-weight: 500;
  }

  /* ============ QUOTE ============ */
  .quote {
    padding: 160px 40px;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
  }
  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 44px;
    color: var(--dark);
    font-weight: 300;
    line-height: 1.4;
    margin-bottom: 32px;
    letter-spacing: -0.5px;
  }
  .quote-text::before, .quote-text::after {
    content: '"';
    color: var(--gold);
  }
  .quote-attr {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ============ FOOTER ============ */
  footer {
    padding: 80px 40px 40px;
    background: var(--cream-deep);
    text-align: center;
  }
  .foot-wordmark {
    font-family: 'Allura', cursive;
    font-size: 40px;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .foot-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 6px;
    color: var(--mid);
    margin-bottom: 28px;
  }
  .foot-ig {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    padding: 14px 28px;
    border: 1px solid var(--gold);
    border-radius: 999px;
    color: var(--dark);
    text-decoration: none;
    transition: all 0.3s;
  }
  .foot-ig:hover { background: var(--gold); color: var(--cream); }
  .foot-meta {
    font-size: 10px;
    color: var(--soft);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 40px;
  }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }

  /* Mobile */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { gap: 14px; font-size: 9px; }
    .nav-brand { font-size: 22px; }
    .hero { padding: 100px 20px 40px; }
    .hero-logo { width: 220px; height: 220px; margin-bottom: 20px; }
    .hero-title { font-size: 38px; }
    .hero-sub { font-size: 14px; }
    .banner { padding: 80px 20px; }
    .banner-h { font-size: 56px; letter-spacing: -1px; }
    .collection { padding: 70px 20px; }
    .grid { grid-template-columns: 1fr; gap: 30px; }
    .story { grid-template-columns: 1fr; padding: 70px 20px; gap: 40px; }
    .story-h { font-size: 36px; }
    .values { padding: 70px 20px; }
    .values-grid { grid-template-columns: 1fr; gap: 32px; }
    .values-h { font-size: 32px; }
    .compare { padding: 70px 20px; }
    .compare-h { font-size: 32px; }
    .compare-cell { padding: 16px; font-size: 12px; }
    .quote { padding: 80px 20px; }
    .quote-text { font-size: 28px; }
    .cursor-flame { display: none; }
    body { cursor: auto; }
  }
</style>
<script src="theme-candle.js" defer></script>

<script>
  // ============ SPLASH FLOW: Otomatik Video → Stage 2 ============

  // Sayfa yüklenir yüklenmez video başlat (otomatik)
  window.addEventListener('DOMContentLoaded', () => {
    // Hafif gecikme: render bitsin, sonra video aç
    setTimeout(() => {
      openVideo();
    }, 400);
  });

  // "Atölyeye Gir" → atolye.html'e git
  function enterAtolye() {
    sessionStorage.setItem('autoplay-music', '1');
    
    const splash = document.getElementById('splash');
    splash.classList.add('fade-out');
    
    setTimeout(() => {
      window.location.href = 'atolye.html';
    }, 800);
  }

  // "Hikayemizi Oku" → hikaye.html'e git
  function goToHikaye() {
    sessionStorage.setItem('autoplay-music', '1');
    
    const splash = document.getElementById('splash');
    splash.classList.add('fade-out');
    
    setTimeout(() => {
      window.location.href = 'hikaye.html';
    }, 800);
  }

  // Video oynat
  function openVideo() {
    const modal = document.getElementById('videoModal');
    const video = document.getElementById('introVideo');
    const placeholder = document.getElementById('videoPlaceholder');
    
    modal.classList.add('show');
    
    video.addEventListener('error', () => {
      video.style.display = 'none';
      placeholder.style.display = 'flex';
    }, { once: true });
    
    video.addEventListener('loadeddata', () => {
      video.style.display = 'block';
      placeholder.style.display = 'none';
      // Browser autoplay politikası: ses ile autoplay engellenir, sessiz başlat
      video.muted = true;
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // Hâlâ engellendiyse, kontroller göster
          video.controls = true;
        });
      }
    }, { once: true });

    // Video bittiğinde → Stage 2'yi göster (logo + içerik)
    video.addEventListener('ended', () => {
      modal.classList.add('fading-out');
      setTimeout(() => {
        modal.classList.remove('show');
        modal.classList.remove('fading-out');
        video.pause();
        showStage2();
      }, 600);
    }, { once: true });
    
    video.addEventListener('click', () => {
      if (video.paused) video.play();
      else video.pause();
    });
    
    video.load();
  }

  function closeVideo() {
    const modal = document.getElementById('videoModal');
    const video = document.getElementById('introVideo');
    if (modal) {
      modal.classList.add('fading-out');
      setTimeout(() => {
        modal.classList.remove('show');
        modal.classList.remove('fading-out');
        if (video) video.pause();
        showStage2();
      }, 600);
    }
  }

  // Stage 2'yi göster (logo + Bir mum hikayesi + by Merve + söz + butonlar)
  function showStage2() {
    const stage2 = document.getElementById('splashStage2');
    if (stage2) stage2.classList.add('show');
  }

  // ESC ile video kapat → stage 2 görünsün
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      const modal = document.getElementById('videoModal');
      if (modal && modal.classList.contains('show')) {
        closeVideo();
      }
    }
  });

  // ============ CINEMATIC BRIDGE ============
  function startCinematicBridge() {
    const bridge = document.getElementById('cinematicBridge');
    const particles = document.getElementById('cbParticles');
    
    const splash = document.getElementById('splash');
    if (splash) splash.style.display = 'none';
    
    bridge.classList.add('active');
    
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'cb-particle';
      const drift = (Math.random() - 0.5) * 500;
      const delay = 1.8 + Math.random() * 2;
      const size = 2 + Math.random() * 3;
      p.style.setProperty('--drift', drift + 'px');
      p.style.animationDelay = delay + 's';
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      particles.appendChild(p);
    }
    
    // 10 saniye sonra otomatik atölye sayfasına geç
    setTimeout(() => {
      if (bridge.classList.contains('active')) {
        finishBridgeAndEnter();
      }
    }, 10000);
  }

  function finishBridgeAndEnter() {
    const bridge = document.getElementById('cinematicBridge');
    bridge.style.transition = 'opacity 1.2s ease';
    bridge.style.opacity = '0';
    
    setTimeout(() => {
      // Atölye sayfasına git
      window.location.href = 'atolye.html';
    }, 1200);
  }

  // ESC ile video kapat (sonra bridge çalışır)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      const modal = document.getElementById('videoModal');
      if (modal && modal.classList.contains('show')) {
        closeVideo();
      }
    }
  });

  // Custom cursor
  const cursor = document.getElementById('cursorFlame');
  if (cursor) {
    document.addEventListener('mousemove', (e) => {
      cursor.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;
    });
  }
</script>

</body>
</html>
