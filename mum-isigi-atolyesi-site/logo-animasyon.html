<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mum Işığı Atölyesi — Animasyonlu Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #faf6ee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    padding: 20px;
  }
  .stage {
    width: 100%;
    max-width: 600px;
    aspect-ratio: 1;
    position: relative;
  }
  .replay-btn {
    margin-top: 30px;
    background: transparent;
    border: 1px solid #b8945a;
    color: #3d2f22;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .replay-btn:hover {
    background: #b8945a;
    color: #faf6ee;
  }
  .hint {
    font-size: 11px;
    color: #b8945a;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 16px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  /* SVG element starting states */
  svg .jar, svg .jar-leaf {
    opacity: 0;
    transform-origin: 300px 360px;
    transform: scale(0.85);
  }
  svg .wick { opacity: 0; }
  svg .flame { opacity: 0; transform-origin: 300px 220px; transform: scale(0); }
  svg .flame-inner { opacity: 0; transform-origin: 300px 210px; transform: scale(0); }
  svg .leaf-l { opacity: 0; transform-origin: 220px 280px; }
  svg .leaf-r { opacity: 0; transform-origin: 380px 280px; }
  svg .flower-r { opacity: 0; transform-origin: 380px 280px; transform: scale(0); }
  svg .dot-arc { opacity: 0; }
  svg .frame-l, svg .frame-r { opacity: 0; }
  svg .script-text {
    opacity: 0;
    clip-path: inset(0 100% 0 0);
  }
  svg .heart { opacity: 0; transform-origin: 300px 478px; transform: scale(0); }
  svg .atolyesi-text { opacity: 0; }
  svg .deco-line-l, svg .deco-line-r { opacity: 0; }
  svg .wreath { opacity: 0; transform-origin: 300px 555px; transform: scale(0.5); }
  svg .heart-bottom { opacity: 0; transform-origin: 300px 580px; transform: scale(0); }

  /* Play class triggers animations */
  .play .jar {
    animation: fadeInScale 0.7s cubic-bezier(0.34, 1.4, 0.64, 1) 0.1s forwards;
  }
  .play .jar-leaf {
    animation: fadeInScale 0.5s ease-out 0.6s forwards;
  }
  .play .wick {
    animation: fadeIn 0.3s ease-out 0.8s forwards;
  }
  .play .flame {
    animation: ignite 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards,
               flicker 2.5s ease-in-out 1.5s infinite;
  }
  .play .flame-inner {
    animation: ignite 0.4s ease-out 1.2s forwards,
               flickerInner 2.5s ease-in-out 1.5s infinite;
  }
  .play .leaf-l-1 { animation: growLeafL 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.3s forwards; }
  .play .leaf-l-2 { animation: growLeafL 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.4s forwards; }
  .play .leaf-l-3 { animation: growLeafL 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.5s forwards; }
  .play .leaf-l-4 { animation: growLeafL 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.6s forwards; }
  .play .leaf-r-1 { animation: growLeafR 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.3s forwards; }
  .play .leaf-r-2 { animation: growLeafR 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.4s forwards; }
  .play .leaf-r-3 { animation: growLeafR 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) 1.5s forwards; }
  .play .flower-r-1 { animation: bloom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.8s forwards; }
  .play .flower-r-2 { animation: bloom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.95s forwards; }
  .play .flower-r-3 { animation: bloom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 2.1s forwards; }
  .play .dot-arc {
    animation: fadeIn 0.8s ease-out 2.2s forwards;
  }
  .play .frame-l, .play .frame-r {
    animation: fadeIn 0.8s ease-out 2.3s forwards;
  }
  .play .script-text {
    animation: writeText 1.4s cubic-bezier(0.65, 0, 0.35, 1) 2.5s forwards;
  }
  .play .heart {
    animation: heartPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 3.7s forwards;
  }
  .play .atolyesi-text {
    animation: fadeInUp 0.7s ease-out 3.9s forwards;
  }
  .play .deco-line-l {
    animation: drawLineL 0.5s ease-out 4.2s forwards;
  }
  .play .deco-line-r {
    animation: drawLineR 0.5s ease-out 4.2s forwards;
  }
  .play .wreath {
    animation: bloomWreath 0.6s cubic-bezier(0.34, 1.4, 0.64, 1) 4.4s forwards;
  }
  .play .heart-bottom {
    animation: heartPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 4.7s forwards;
  }

  /* Keyframes */
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes fadeInScale {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes ignite {
    0% { opacity: 0; transform: scale(0) translateY(10px); }
    60% { opacity: 1; transform: scale(1.3) translateY(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes flicker {
    0%, 100% { transform: scale(1) rotate(0deg); }
    20% { transform: scale(1.05, 0.95) rotate(-1deg); }
    40% { transform: scale(0.97, 1.05) rotate(1deg); }
    60% { transform: scale(1.03, 0.98) rotate(-0.5deg); }
    80% { transform: scale(0.98, 1.02) rotate(0.5deg); }
  }
  @keyframes flickerInner {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(0.92); }
  }
  @keyframes growLeafL {
    from { opacity: 0; transform: scale(0) rotate(-20deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes growLeafR {
    from { opacity: 0; transform: scale(0) rotate(20deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes bloom {
    from { opacity: 0; transform: scale(0); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes writeText {
    from { opacity: 1; clip-path: inset(0 100% 0 0); }
    to { opacity: 1; clip-path: inset(0 0% 0 0); }
  }
  @keyframes heartPop {
    0% { opacity: 0; transform: scale(0); }
    70% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes drawLineL {
    from { opacity: 0; transform: scaleX(0); transform-origin: right; }
    to { opacity: 1; transform: scaleX(1); transform-origin: right; }
  }
  @keyframes drawLineR {
    from { opacity: 0; transform: scaleX(0); transform-origin: left; }
    to { opacity: 1; transform: scaleX(1); transform-origin: left; }
  }
  @keyframes bloomWreath {
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">

    <!-- Decorative dot arc at top -->
    <g class="dot-arc">
      <circle cx="220" cy="170" r="1.5" fill="#c8a866"/>
      <circle cx="240" cy="155" r="1.5" fill="#c8a866"/>
      <circle cx="265" cy="145" r="1.5" fill="#c8a866"/>
      <circle cx="295" cy="142" r="2" fill="#c8a866"/>
      <circle cx="325" cy="145" r="1.5" fill="#c8a866"/>
      <circle cx="350" cy="155" r="1.5" fill="#c8a866"/>
      <circle cx="370" cy="170" r="1.5" fill="#c8a866"/>
      <circle cx="385" cy="190" r="1" fill="#c8a866"/>
      <circle cx="395" cy="215" r="1" fill="#c8a866"/>
      <circle cx="205" cy="190" r="1" fill="#c8a866"/>
      <circle cx="195" cy="215" r="1" fill="#c8a866"/>
    </g>

    <!-- Decorative side frames (subtle circle outline pieces) -->
    <path class="frame-l" d="M 180 230 Q 150 320 180 410" stroke="#c8a866" stroke-width="0.7" fill="none" opacity="0.6"/>
    <path class="frame-r" d="M 420 230 Q 450 320 420 410" stroke="#c8a866" stroke-width="0.7" fill="none" opacity="0.6"/>

    <!-- LEFT BOTANICAL — sage green leaves -->
    <g class="leaf-l leaf-l-1">
      <path d="M 200 250 Q 180 235 165 220 Q 155 215 150 225 Q 158 240 175 250 Q 190 258 200 250 Z" fill="#b5c4a3" opacity="0.85"/>
      <path d="M 175 230 L 195 248" stroke="#9eab8a" stroke-width="0.6" fill="none"/>
    </g>
    <g class="leaf-l leaf-l-2">
      <path d="M 215 290 Q 185 285 155 280 Q 142 285 148 295 Q 165 305 190 305 Q 210 305 215 290 Z" fill="#9eab8a" opacity="0.9"/>
      <path d="M 160 290 L 210 295" stroke="#7f8e6b" stroke-width="0.6" fill="none"/>
    </g>
    <g class="leaf-l leaf-l-3">
      <path d="M 220 325 Q 195 335 170 340 Q 155 340 158 350 Q 175 360 200 355 Q 220 348 225 335 Z" fill="#b5c4a3" opacity="0.85"/>
      <path d="M 170 343 L 220 338" stroke="#9eab8a" stroke-width="0.6" fill="none"/>
    </g>
    <g class="leaf-l leaf-l-4">
      <path d="M 230 365 Q 210 375 188 385 Q 175 390 180 400 Q 200 405 220 395 Q 235 385 232 372 Z" fill="#a8b598" opacity="0.85"/>
      <path d="M 192 388 L 228 380" stroke="#7f8e6b" stroke-width="0.6" fill="none"/>
    </g>

    <!-- RIGHT BOTANICAL — cream/white flowers and buds -->
    <g class="leaf-r leaf-r-1">
      <path d="M 400 250 Q 420 235 435 220 Q 445 215 450 225 Q 442 240 425 250 Q 410 258 400 250 Z" fill="#e8dcc8" opacity="0.85"/>
      <path d="M 425 230 L 405 248" stroke="#c8a866" stroke-width="0.5" fill="none"/>
    </g>
    <g class="leaf-r leaf-r-2">
      <path d="M 385 290 Q 415 285 445 280 Q 458 285 452 295 Q 435 305 410 305 Q 390 305 385 290 Z" fill="#d8c9af" opacity="0.85"/>
      <path d="M 440 290 L 390 295" stroke="#b8945a" stroke-width="0.5" fill="none"/>
    </g>
    <g class="leaf-r leaf-r-3">
      <path d="M 380 325 Q 405 335 430 340 Q 445 340 442 350 Q 425 360 400 355 Q 380 348 375 335 Z" fill="#e8dcc8" opacity="0.85"/>
      <path d="M 430 343 L 380 338" stroke="#c8a866" stroke-width="0.5" fill="none"/>
    </g>

    <!-- Small flower buds on right -->
    <g class="flower-r flower-r-1">
      <circle cx="450" cy="260" r="4" fill="#f0e8d8" stroke="#c8a866" stroke-width="0.5"/>
      <circle cx="450" cy="260" r="1.5" fill="#c8a866"/>
    </g>
    <g class="flower-r flower-r-2">
      <circle cx="460" cy="290" r="5" fill="#f0e8d8" stroke="#c8a866" stroke-width="0.5"/>
      <circle cx="460" cy="290" r="2" fill="#c8a866"/>
    </g>
    <g class="flower-r flower-r-3">
      <circle cx="455" cy="320" r="4" fill="#f0e8d8" stroke="#c8a866" stroke-width="0.5"/>
      <circle cx="455" cy="320" r="1.5" fill="#c8a866"/>
    </g>

    <!-- CANDLE JAR -->
    <g class="jar">
      <!-- Jar shadow -->
      <ellipse cx="300" cy="420" rx="80" ry="6" fill="#c8a866" opacity="0.15"/>
      <!-- Jar body -->
      <path d="M 240 250 Q 240 240 250 240 L 350 240 Q 360 240 360 250 L 360 415 Q 360 420 355 420 L 245 420 Q 240 420 240 415 Z"
            fill="#f5ecd9" stroke="#c8a866" stroke-width="1.2" opacity="0.95"/>
      <!-- Jar rim -->
      <path d="M 245 250 L 355 250" stroke="#c8a866" stroke-width="0.8" opacity="0.6"/>
      <!-- Vertical light lines on jar -->
      <line x1="260" y1="260" x2="260" y2="410" stroke="#c8a866" stroke-width="0.4" opacity="0.3"/>
      <line x1="280" y1="260" x2="280" y2="410" stroke="#c8a866" stroke-width="0.3" opacity="0.2"/>
      <line x1="320" y1="260" x2="320" y2="410" stroke="#c8a866" stroke-width="0.3" opacity="0.2"/>
      <line x1="340" y1="260" x2="340" y2="410" stroke="#c8a866" stroke-width="0.4" opacity="0.3"/>
    </g>

    <!-- Small leaf decoration on jar -->
    <g class="jar-leaf">
      <path d="M 295 335 Q 290 320 295 310 Q 300 320 295 335 Z" fill="#9eab8a" opacity="0.8"/>
      <path d="M 305 335 Q 310 320 305 310 Q 300 320 305 335 Z" fill="#9eab8a" opacity="0.8"/>
      <line x1="300" y1="335" x2="300" y2="345" stroke="#9eab8a" stroke-width="0.8"/>
      <!-- Tiny heart -->
      <path d="M 300 355 L 297 351 Q 295 348 298 348 Q 300 348 300 350 Q 300 348 302 348 Q 305 348 303 351 Z" fill="#c8a866"/>
    </g>

    <!-- Wick -->
    <line class="wick" x1="300" y1="240" x2="300" y2="232" stroke="#3d2f22" stroke-width="1.5"/>

    <!-- FLAME -->
    <g class="flame">
      <!-- Outer flame glow -->
      <ellipse cx="300" cy="220" rx="14" ry="22" fill="#f5d989" opacity="0.4"/>
      <!-- Main flame body -->
      <path d="M 300 198 Q 290 215 290 228 Q 290 240 300 240 Q 310 240 310 228 Q 310 215 300 198 Z"
            fill="#f0c674"/>
    </g>
    <g class="flame-inner">
      <!-- Inner brighter flame -->
      <path d="M 300 210 Q 295 220 295 228 Q 295 235 300 235 Q 305 235 305 228 Q 305 220 300 210 Z"
            fill="#fde8b3"/>
    </g>

    <!-- SCRIPT TEXT "Mum Işığı" -->
    <text class="script-text" x="300" y="475"
          text-anchor="middle"
          font-family="'Allura', cursive"
          font-size="78"
          fill="#c8a866">Mum Işığı</text>

    <!-- Small heart between script and ATÖLYESİ -->
    <path class="heart" d="M 300 487 L 294 481 Q 290 476 296 476 Q 300 476 300 480 Q 300 476 304 476 Q 310 476 306 481 Z" fill="#c8a866"/>

    <!-- Decorative lines on either side of ATÖLYESİ -->
    <line class="deco-line-l" x1="225" y1="510" x2="252" y2="510" stroke="#c8a866" stroke-width="0.7"/>
    <line class="deco-line-r" x1="348" y1="510" x2="375" y2="510" stroke="#c8a866" stroke-width="0.7"/>

    <!-- ATÖLYESİ TEXT -->
    <text class="atolyesi-text" x="300" y="516"
          text-anchor="middle"
          font-family="'Cormorant Garamond', serif"
          font-size="22"
          font-weight="500"
          letter-spacing="6"
          fill="#5a4632">ATÖLYESİ</text>

    <!-- Bottom wreath -->
    <g class="wreath">
      <!-- Left side of wreath -->
      <path d="M 250 555 Q 240 545 232 540" stroke="#9eab8a" stroke-width="0.8" fill="none"/>
      <ellipse cx="245" cy="552" rx="5" ry="2" fill="#9eab8a" opacity="0.7" transform="rotate(-30 245 552)"/>
      <ellipse cx="252" cy="547" rx="4" ry="1.8" fill="#9eab8a" opacity="0.7" transform="rotate(-45 252 547)"/>
      <ellipse cx="238" cy="557" rx="4" ry="1.5" fill="#9eab8a" opacity="0.6" transform="rotate(-15 238 557)"/>
      <!-- Right side of wreath -->
      <path d="M 350 555 Q 360 545 368 540" stroke="#9eab8a" stroke-width="0.8" fill="none"/>
      <ellipse cx="355" cy="552" rx="5" ry="2" fill="#9eab8a" opacity="0.7" transform="rotate(30 355 552)"/>
      <ellipse cx="348" cy="547" rx="4" ry="1.8" fill="#9eab8a" opacity="0.7" transform="rotate(45 348 547)"/>
      <ellipse cx="362" cy="557" rx="4" ry="1.5" fill="#9eab8a" opacity="0.6" transform="rotate(15 362 557)"/>
      <!-- Center dot -->
      <circle cx="300" cy="560" r="1.5" fill="#c8a866"/>
    </g>

    <!-- Bottom small heart -->
    <path class="heart-bottom" d="M 300 583 L 296 578 Q 293 574 297 574 Q 300 574 300 577 Q 300 574 303 574 Q 307 574 304 578 Z" fill="#c8a866"/>

  </svg>
</div>

<button class="replay-btn" onclick="replay()">Tekrar Oynat ↻</button>
<div class="hint">— Ekran kaydı al, Instagram intro olarak kullan —</div>

<script>
  const stage = document.getElementById('stage');

  function play() {
    stage.classList.remove('play');
    // Force reflow so animations restart
    void stage.offsetWidth;
    stage.classList.add('play');
  }

  function replay() {
    play();
  }

  // Auto-play on load
  window.addEventListener('load', () => {
    setTimeout(play, 300);
  });
</script>

</body>
</html>
